<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHÁNH MOD MENU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .menu-card { width: 100%; max-width: 350px; background: #1e293b; border: 2px solid #ef4444; border-radius: 15px; overflow: hidden; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 12px; margin: 8px; border-radius: 10px; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #475569; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: #ef4444; }
        input:checked + .slider:before { transform: translateX(20px); }
        .btn-game { background: #ef4444; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-game:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="menu-card">
        <div class="bg-red-600 p-4 text-center font-bold italic">KHÁNH MOD MENU v3.0</div>
        
        <div class="p-2">
            <p class="text-xs text-gray-400 ml-2 mt-2">AIMBOT SETTINGS</p>
            <div class="feature-item"><span>Aimlock / Headshot</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="feature-item"><span>Aim 360° Smooth</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>

            <p class="text-xs text-gray-400 ml-2 mt-4">ESP SETTINGS</p>
            <div class="feature-item"><span>Antenna Head</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            <div class="feature-item"><span>ESP Wallhack</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>

            <p class="text-xs text-gray-400 ml-2 mt-4">LAUNCHER</p>
            <div class="px-2 pb-4">
                <button onclick="alert('Đang mở Free Fire...')" class="btn-game">OPEN FREE FIRE</button>
                <button onclick="alert('Đang mở FF MAX...')" class="btn-game bg-yellow-600">OPEN FF MAX</button>
            </div>
        </div>
    </div>
</body>
</html>
