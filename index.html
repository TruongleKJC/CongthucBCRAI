<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHÁNH MOD MENU ONLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: rgba(15, 15, 20, 0.98);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        .menu-card {
            width: 300px;
            border: 2px solid #ff0000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }
        .header {
            background: linear-gradient(135deg, #ff0000, #440000);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .section {
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .label-title {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
        }
        /* Switch UI */
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff0000; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Button Launcher */
        .btn-launch {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-ff { background: #e11d48; }
        .btn-max { background: #f59e0b; }
        .btn-launch:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

<div class="menu-card">
    <div class="header">
        <div class="text-lg">KHÁNH MOD V5.0</div>
        <div class="text-[9px] opacity-70">HỆ THỐNG ĐIỀU KHIỂN GITHUB</div>
    </div>

    <div class="section">
        <span class="label-title">Chức năng chiến đấu</span>
        <div class="item">
            <span>Aimlock Head</span>
            <label class="switch"><input type="checkbox" onchange="callAndroid('Aim')"><span class="slider"></span></label>
        </div>
        <div class="item">
            <span>ESP Line (Hộp)</span>
            <label class="switch"><input type="checkbox" onchange="callAndroid('ESP')"><span class="slider"></span></label>
        </div>
    </div>

    <div class="section">
        <span class="label-title">Khởi động Free Fire</span>
        <button class="btn-launch btn-ff" onclick="launchGame('com.dts.freefireth')">CHẠY FREE FIRE THƯỜNG</button>
        <button class="btn-launch btn-max" onclick="launchGame('com.dts.freefiremax')">CHẠY FREE FIRE MAX</button>
    </div>
</div>

<script>
    // Hàm gọi các tính năng Mod
    function callAndroid(feature) {
        if (window.Android) {
            window.Android.toggle(feature);
        } else {
            console.log("Đang chạy trên web: Bật " + feature);
        }
    }

    // Hàm thực hiện lệnh chạy App Free Fire
    function launchGame(packageName) {
        if (window.Android) {
            // Gọi lệnh qua cầu nối Java trong AIDE
            window.Android.launchGame(packageName);
        } else {
            alert("Lỗi: Cầu nối Android chưa được thiết lập!");
        }
    }
</script>

</body>
</html>
