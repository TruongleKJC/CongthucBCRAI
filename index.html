<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHÁNH FF LAUNCHER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background: radial-gradient(circle at center, #1e1e2e 0%, #0f0f17 100%);
            color: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-border-red {
            border: 1px solid #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        .btn-hover:active {
            transform: scale(0.96);
        }
        /* Hiệu ứng quét sáng cho nút bấm */
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-sm rounded-3xl p-6 neon-border-red flex flex-col items-center">
        <div class="mb-6 text-center">
            <div class="w-20 h-20 bg-red-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-red-900/50">
                <i class="fas fa-bolt text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black italic text-white tracking-tighter">KHÁNH MOD <span class="text-red-500">V8.0</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-1">Hệ thống khởi động an toàn</p>
        </div>

        <div class="w-full space-y-3 mb-8">
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <i class="fas fa-shield-alt text-green-500"></i>
                    <span class="text-sm font-medium">Anti-Ban Bypass</span>
                </div>
                <span class="text-[10px] font-bold text-green-500 bg-green-500/10 px-2 py-1 rounded">ONLINE</span>
            </div>
            
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <i class="fas fa-crosshairs text-red-500"></i>
                    <span class="text-sm font-medium">Auto Aimlock</span>
                </div>
                <input type="checkbox" checked class="w-5 h-5 accent-red-600">
            </div>
        </div>

        <div class="w-full space-y-4">
            <button onclick="launch('com.dts.freefireth')" class="btn-hover shimmer w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-red-900/20">
                <i class="fas fa-play"></i>
                MỞ FREE FIRE THƯỜNG
            </button>

            <button onclick="launch('com.dts.freefiremax')" class="btn-hover shimmer w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-orange-900/20">
                <i class="fas fa-fire"></i>
                MỞ FREE FIRE MAX
            </button>
        </div>

        <div class="mt-8 text-[10px] text-gray-600 flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            Server: GitHub Mainframe v2026
        </div>
    </div>

    <script>
        // Hàm xử lý gọi sang Java của AIDE
        function launch(packageName) {
            if (window.Android) {
                // Hiển thị hiệu ứng chờ đơn giản trước khi mở
                console.log("Đang khởi động: " + packageName);
                window.Android.launchGame(packageName);
            } else {
                alert("Lỗi: Không tìm thấy cầu nối hệ thống Android!");
            }
        }
    </script>
</body>
</html>
