<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHÁNH MOD MENU FULL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh giao diện Menu */
        body {
            background: rgba(10, 10, 15, 0.95);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 5px;
        }
        .menu-container {
            width: 280px;
            border: 2px solid #ff0000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        .header {
            background: linear-gradient(90deg, #ff0000, #990000);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-style: italic;
            text-shadow: 1px 1px 2px black;
        }
        .section-title {
            font-size: 11px;
            color: #ff4444;
            padding: 8px 12px 2px 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            margin: 5px 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Switch Button */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff0000; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Nút bấm mở Game */
        .btn-launch {
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-ff { background: #ff0000; color: white; }
        .btn-max { background: #ff8c00; color: white; }
        .btn-launch:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="header">
        KHÁNH MOD MENU V4.0
        <div class="text-[8px] font-normal uppercase tracking-widest">GitHub Online System</div>
    </div>

    <div class="p-1">
        <div class="section-title">Hỗ trợ ngắm (Aim)</div>
        <div class="feature-item">
            <span class="text-sm">Auto Aimlock</span>
            <label class="switch"><input type="checkbox" onchange="sendAction('Aim')"><span class="slider"></span></label>
        </div>
        <div class="feature-item">
            <span class="text-sm">Aim 360 Smooth</span>
            <label class="switch"><input type="checkbox" onchange="sendAction('Aim360')"><span class="slider"></span></label>
        </div>

        <div class="section-title">Hiển thị (ESP)</div>
        <div class="feature-item">
            <span class="text-sm">ESP Line/Box</span>
            <label class="switch"><input type="checkbox" onchange="sendAction('ESP')"><span class="slider"></span></label>
        </div>
        <div class="feature-item">
            <span class="text-sm">Antenna Head</span>
            <label class="switch"><input type="checkbox" onchange="sendAction('Antenna')"><span class="slider"></span></label>
        </div>

        <div class="section-title">Hệ thống</div>
        <div class="feature-item">
            <span class="text-sm text-green-400">Antiban Security</span>
            <label class="switch"><input type="checkbox" checked onchange="sendAction('Antiban')"><span class="slider"></span></label>
        </div>

        <div class="section-title">Khởi động nhanh</div>
        <div class="grid grid-cols-2 gap-2 px-2.5 pb-4 mt-1">
            <button class="btn-launch btn-ff" onclick="launch('com.dts.freefireth')">FREE FIRE</button>
            <button class="btn-launch btn-max" onclick="launch('com.dts.freefiremax')">FF MAX</button>
        </div>
    </div>
</div>

<script>
    // Hàm gửi lệnh bật/tắt tính năng về App Java
    function sendAction(featureName) {
        if (window.Android) {
            window.Android.toggle(featureName);
        } else {
            console.log("Tính năng: " + featureName);
        }
    }

    // Hàm gửi lệnh mở Game về App Java
    function launch(packageName) {
        if (window.Android) {
            window.Android.launchGame(packageName);
        } else {
            alert("Đang chạy trên trình duyệt - Không thể mở: " + packageName);
        }
    }
</script>

</body>
</html>
