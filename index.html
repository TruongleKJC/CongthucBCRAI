<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHÁNH MOD V11 - AIMBOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .menu-card { width: 320px; border: 2px solid #ff0000; border-radius: 20px; background: #0a0a0a; box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); overflow: hidden; }
        .header { background: linear-gradient(90deg, #ff0000, #440000); padding: 15px; text-align: center; font-weight: bold; font-style: italic; font-size: 18px; }
        .section { padding: 10px 15px; border-bottom: 1px solid #222; }
        .label { font-size: 11px; color: #ff4444; text-transform: uppercase; margin-bottom: 10px; display: block; font-weight: bold; }
        
        /* Switch UI */
        .feature-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; margin-bottom: 5px; border-radius: 10px; border: 1px solid #222; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Button Launch */
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; font-weight: bold; text-decoration: none; text-align: center; color: white; border: none; cursor: pointer; }
        .btn-ff { background: #ff0000; }
        .btn-max { background: #ff8c00; }
    </style>
</head>
<body>

<div class="menu-card">
    <div class="header">KHÁNH MOD V11</div>
    
    <div class="section">
        <span class="label">Menu Chiến Đấu</span>
        <div class="feature-item">
            <span class="text-sm">Aimbot 100%</span>
            <label class="switch"><input type="checkbox" onchange="modAction('Aimbot')"><span class="slider"></span></label>
        </div>
        <div class="feature-item">
            <span class="text-sm">Aim Lock Head</span>
            <label class="switch"><input type="checkbox" onchange="modAction('AimHead')"><span class="slider"></span></label>
        </div>
        <div class="feature-item">
            <span class="text-sm">Auto Headshot</span>
            <label class="switch"><input type="checkbox" onchange="modAction('AutoHS')"><span class="slider"></span></label>
        </div>
    </div>

    <div class="section" style="border:none;">
        <span class="label">Khởi Động Nhanh</span>
        <a href="intent://#Intent;package=com.dts.freefireth;scheme=android-app;end" class="btn btn-ff">MỞ FREE FIRE THƯỜNG</a>
        <a href="intent://#Intent;package=com.dts.freefiremax;scheme=android-app;end" class="btn btn-max">MỞ FREE FIRE MAX</a>
    </div>

    <div class="text-[9px] text-center text-gray-700 py-2">Hệ thống GitHub - Chống Ban V3</div>
</div>

<script>
    function modAction(feature) {
        // Nếu bạn muốn nó "có tác dụng" thực sự, bạn CẦN cầu nối Java.
        // Nếu không có cầu nối, các nút này chỉ để trang trí (Fake Mod).
        if(window.Android) {
            window.Android.toggle(feature);
        } else {
            console.log("Kích hoạt tính năng: " + feature);
        }
    }
</script>

</body>
</html>
